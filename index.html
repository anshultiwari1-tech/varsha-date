<!DOCTYPE html>
<html>
<head>
<title>Date With Me ❤️</title>

<style>

body{
margin:0;
height:100vh;ont-family:Arial;
text-align:center;ackground:black;\noverflow:hidden;
color:white;
}

/* Netflix intro */

#intro{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:black;
font-size:120px;
font-weight:bold;
color:red;
animation:introAnim 3s forwards;
}

@keyframes introAnim{
0%{opacity:0;transform:scale(0.5);}
50%{opacity:1;transform:scale(1.2);}
100%{opacity:0;transform:scale(1);}
}

/* main proposal */

#main{
display:none;
background:#ffd6e0;
height:100vh;
color:#ff2e63;
}

h1{
padding-top:150px;
font-size:38px;
}

button{
padding:15px 28px;
font-size:20px;
border:none;
border-radius:12px;
cursor:pointer;
position:absolute;
}

#yes{
background:#ff2e63;
color:white;
left:40%;
top:55%;
font-size:20px;
}

#no{
background:#333;
color:white;
left:55%;
top:55%;
}

.heart{
position:absolute;
font-size:25px;
animation:rain 4s linear infinite;
}

@keyframes rain{
0%{transform:translateY(-100vh);}
100%{transform:translateY(100vh);}
}

</style>
</head>

<body>

<div id="intro">N</div>

<div id="main">

<h1>Varsha, will you go on a date with me? ❤️</h1>

<button id="yes" onclick="explode()">Yes ❤️</button>
<button id="no" onclick="moveNo()">No 😅</button>

</div>

<script>

let yesSize = 20;

/* show proposal after intro */

setTimeout(function(){
document.getElementById("intro").style.display="none";
document.getElementById("main").style.display="block";
},3000);

/* no button move + yes grow */

function moveNo(){

let x=Math.random()*(window.innerWidth-100);
let y=Math.random()*(window.innerHeight-50);

let noBtn=document.getElementById("no");
noBtn.style.left=x+"px";
noBtn.style.top=y+"px";

/* grow yes button */

yesSize += 10;

let yesBtn=document.getElementById("yes");
yesBtn.style.fontSize = yesSize + "px";
yesBtn.style.padding = (yesSize/2) + "px " + yesSize + "px";

}

/* heart explosion */

function explode(){

document.body.innerHTML =
"<h1 style='margin-top:200px;color:#ff2e63'>Yay Varsha ❤️ Our date is confirmed 😍</h1>";

for(let i=0;i<150;i++){

let heart=document.createElement("div");

heart.innerHTML="❤️";
heart.style.position="absolute";
heart.style.left=Math.random()*100+"vw";
heart.style.top=Math.random()*100+"vh";
heart.style.fontSize="30px";

document.body.appendChild(heart);

}

}

/* heart rain */

setInterval(function(){

let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

},300);

</script>

</body>
</html>
